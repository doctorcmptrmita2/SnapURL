version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snapurl_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - snapurl
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: snapurl_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - snapurl
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: snapurl_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: snapurl
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: snapurl
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - snapurl

  redis:
    image: redis:alpine
    container_name: snapurl_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - snapurl

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snapurl_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --tries=3
    networks:
      - snapurl
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:

networks:
  snapurl:
    driver: bridge

