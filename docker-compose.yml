# Production / Dokploy deployment stack.
# For local development use `composer dev` (artisan serve + vite) instead.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: app
    depends_on:
      - db
      - redis
    expose:
      - "80"
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - snapurl
      - dokploy-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: queue
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=90
    depends_on:
      - db
      - redis
    volumes:
      - storage_data:/var/www/html/storage/app
    networks:
      - snapurl

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: scheduler
    command: php artisan schedule:work
    depends_on:
      - db
      - redis
    networks:
      - snapurl

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-snapurl}
      MYSQL_USER: ${DB_USERNAME:-snapurl}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - snapurl

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - snapurl

volumes:
  db_data:
  redis_data:
  storage_data:

networks:
  snapurl:
    driver: bridge
  # Dokploy's Traefik network — lets the Domain you set in the UI route to `app`.
  dokploy-network:
    external: true
