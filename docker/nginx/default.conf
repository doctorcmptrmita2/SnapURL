server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    # Restore the real visitor IP from Cloudflare. nginx is only reachable via
    # the internal proxy (Traefik), which forwards Cloudflare's CF-Connecting-IP.
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Make Laravel (trustProxies *) see the real client IP, not Cloudflare's.
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
